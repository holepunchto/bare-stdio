name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64

          - os: macos-latest
            platform: darwin
            arch: x64

          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup bare
        run: npm i -g bare-runtime

      - name: Install dependencies
        run: npm i

      - name: Install fixture dependencies
        shell: bash
        run: for dir in test/fixtures/*/; do (cd "$dir" && npm install); done

      - name: Run tests
        run: npm test
